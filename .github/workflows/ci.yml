name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-converter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run HTML to Divi conversion check
        run: npm run check

      - name: Verify generated outputs
        run: |
          test -f dist/landing.divi-shortcodes.txt
          test -f dist/landing.layout.json
          test -f dist/landing.css
          test -f dist/conversion-summary.json
